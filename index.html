<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KICKLIKE · 5-Mann-Autobattler</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div id="app">


  <div id="screen-start" class="screen active">
    <div class="start-hero">
      <h1>KICKLIKE</h1>
      <div class="tagline" data-i18n="ui.start.tagline"></div>
      <div class="sub" data-i18n="ui.start.sub"></div>
      <div id="start-highscore" style="margin-top:20px; font-family:var(--font-display); font-size:12px; color:var(--gold); letter-spacing:0.1em;"></div>
    </div>
    <div style="text-align:center; margin-top:32px;">
      <button class="btn primary" onclick="FLOW.newRun()" data-i18n="ui.start.newRun"></button>
    </div>
		<div style="display:flex; justify-content:center; gap:8px; margin-top:24px; margin-bottom:12px;">
    		<button class="btn" type="button" data-lang="en">EN</button>
			<button class="btn" type="button" data-lang="de">DE</button>
			<button class="btn" type="button" data-lang="es">ES</button>
	  </div>
 	 
    <div class="hint" style="margin-top:40px;">
      <b data-i18n="ui.start.howTitle"></b>
      <span data-i18n="ui.start.howBody"></span>
    </div>
  </div>

  <div id="screen-draft" class="screen">
    <h2 style="color:var(--accent); margin-bottom:8px;" data-i18n="ui.draft.title"></h2>
    <p class="dim" style="margin-bottom:16px;" data-i18n="ui.draft.body"></p>
    <div id="draft-grid" class="draft-grid"></div>
  </div>

  <div id="screen-hub" class="screen">
    <div class="topbar">
      <div class="logo">MATCH <span id="hub-match-num">1</span> / 15</div>
      <div class="meta">
        <span>🏆 <b id="hub-wins">0</b></span>
        <span>💥 <b id="hub-losses">0</b></span>
        <span>PKT <b id="hub-points">0</b></span>
      </div>
    </div>
    <div class="run-progress" id="run-progress"></div>
    <div class="hub-matchup">
      <div class="card hub-side hub-side-me">
        <div class="card-title"><span data-i18n="ui.hub.yourTeam"></span> <span id="hub-team-meta" class="mono-sm"></span></div>
        <div id="hub-team-summary"></div>
      </div>
      <div class="card hub-side hub-side-opp">
        <div class="card-title" data-i18n="ui.hub.opponent"></div>
        <div id="next-opponent"></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title" data-i18n="ui.hub.squad"></div>
      <div class="squad-display" id="hub-squad"></div>
      <div id="hub-bench-wrap" style="display:none; margin-top:10px;">
        <div class="mono-sm" style="margin-bottom:6px;" data-i18n="ui.hub.bench"></div>
        <div class="squad-display" id="hub-bench"></div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="FLOW.openLineup()" data-i18n="ui.hub.lineup"></button>
      <button class="btn primary" onclick="FLOW.startMatch()" data-i18n="ui.hub.startMatch"></button>
    </div>
  </div>

  <div id="screen-lineup" class="screen">
    <div class="topbar">
      <div class="logo" data-i18n="ui.lineup.title"></div>
      <div class="meta">
        <span class="mono-sm" data-i18n="ui.lineup.tapToSwap"></span>
      </div>
    </div>
    <div class="swap-hint" id="lineup-hint" data-i18n="ui.lineup.defaultHint"></div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title"><span data-i18n="ui.lineup.starters"></span> <span class="mono-sm" style="float:right;">5</span></div>
      <div class="lineup-slots" id="lineup-starters"></div>
    </div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title"><span data-i18n="ui.lineup.bench"></span> <span class="mono-sm" style="float:right;" id="bench-count">0</span></div>
      <div class="lineup-bench" id="lineup-bench"></div>
    </div>
    <div class="btn-row">
      <button class="btn" onclick="FLOW.closeLineup()" data-i18n="ui.lineup.done"></button>
    </div>
  </div>

  <div id="screen-recruit" class="screen">
    <div class="recruit-intro">
      <h1 data-i18n="ui.recruit.title"></h1>
      <div class="pixel" data-i18n="ui.recruit.subtitle"></div>
      <p class="dim" style="margin-top:12px;" data-i18n="ui.recruit.body"></p>
    </div>
    <div class="squad-display" id="recruit-options"></div>
    <div class="btn-row" style="justify-content:center;">
      <button class="btn" onclick="FLOW.skipRecruit()" data-i18n="ui.recruit.decline"></button>
    </div>
  </div>

  <div id="screen-match" class="screen">
    <div class="match-header">
      <div class="team-name me" id="match-me-name">-</div>
      <div class="score">
        <span id="score-me">0</span>
        <span class="vs">:</span>
        <span id="score-opp">0</span>
      </div>
      <div class="team-name opp" id="match-opp-name">-</div>
      <div class="round-indicator" id="round-indicator"></div>
    </div>
    <div class="match-log" id="match-log"></div>
    <div style="margin-top:12px; text-align:center; display:flex; gap:8px; justify-content:center;">
      <button class="btn" id="match-pause-btn" onclick="FLOW.togglePause()" data-i18n="ui.match.pause"></button>
      <button class="btn" id="match-speed-btn" onclick="FLOW.toggleSpeed()" data-i18n="ui.match.speed"></button>
    </div>
  </div>

  <div id="screen-result" class="screen">
    <div id="result-content"></div>
  </div>

  <div id="screen-gameover" class="screen">
    <div class="result-big">
      <h1 class="loss" data-i18n="ui.gameover.title"></h1>
      <div class="gameover-text" id="gameover-reason"></div>
      <div style="margin-top:32px;">
        <button class="btn primary" onclick="FLOW.newRun()" data-i18n="ui.start.newRun"></button>
      </div>
    </div>
  </div>

  <div id="screen-victory" class="screen">
    <div class="result-big">
      <h1 class="win">CHAMPION!</h1>
      <div class="pixel" style="color:var(--gold); margin-top:16px;" data-i18n="ui.victory.survived"></div>
      <div id="victory-summary" style="margin-top:24px;"></div>
      <div style="margin-top:32px;">
        <button class="btn primary" onclick="FLOW.newRun()" data-i18n="ui.start.newRun"></button>
      </div>
    </div>
  </div>
</div>

<div class="interrupt-overlay" id="interrupt-overlay">
  <div class="interrupt-modal" id="interrupt-modal"></div>
</div>

<!--
  Script load order reflects the KL namespace dependency graph:

    1. i18n           — sets up I18N so config-data can call decorateConfigData
    2. lang/*         — register locales into I18N
    3. util           — foundation helpers (RNG, DOM, i18n shortcuts)
    4. config-data    — static data + highscore (runs decorateConfigData)
    5. state          — season/roster/session with legacy state proxy
    6. stats          — team aggregations and stat computation
    7. traits         — trigger registry + dispatcher, opp-trait effects
    8. entities       — player/opponent factories (needs traits.OPP_TRAITS)
    9. intel          — matchup intel + post-match trait report
   10. engine         — match engine (needs everything above)
   11. decisions      — situative events + halftime focus/sub (needs engine)
   12. fx             — visual effects (no deps)
   13. ui             — rendering (needs state + intel + engine + i18n)
   14. flow           — top-level screen flow + match orchestration (needs all)
-->
<script src="./js/i18n.js"></script>
<script src="./js/lang/de.js"></script>
<script src="./js/lang/en.js"></script>
<script src="./js/lang/es.js"></script>
<script src="./js/util.js"></script>
<script src="./js/config-data.js"></script>
<script src="./js/state.js"></script>
<script src="./js/stats.js"></script>
<script src="./js/traits.js"></script>
<script src="./js/entities.js"></script>
<script src="./js/intel.js"></script>
<script src="./js/engine.js"></script>
<script src="./js/decisions.js"></script>
<script src="./js/fx.js"></script>
<script src="./js/ui.js"></script>
<script src="./js/flow.js"></script>
</body>
</html>
